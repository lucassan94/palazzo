services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8090:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST:-86.48.18.22}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-delivery}
      - DB_USER=${DB_USER:-default}
      - DB_PASS=${DB_PASS:-default}
      # ATENÇÃO: Configure estas variáveis no ambiente do Portainer ou .env
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - RESTAURANT_ID=${RESTAURANT_ID:-1}
      - CORS_ORIGIN=http://86.48.18.22:8091,http://86.48.18.22:8092,http://86.48.18.22:8093
      # Asaas Payment Gateway — configure no ambiente, NÃO hardcode aqui
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - ASAAS_ENV=${ASAAS_ENV:-sandbox}
      - ASAAS_WEBHOOK_TOKEN=${ASAAS_WEBHOOK_TOKEN}
      - ASAAS_WEBHOOK_SECRET=${ASAAS_WEBHOOK_SECRET}
      - ASAAS_PIX_EXPIRY=${ASAAS_PIX_EXPIRY:-30}
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  cliente:
    build:
      context: ./cliente
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "pidof", "nginx"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8092:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "pidof", "nginx"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s

  entregador:
    build:
      context: ./entregador
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8093:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "pidof", "nginx"]
      interval: 30s
      timeout: 3s
      retries: 2
      start_period: 5s

volumes:
  backend_uploads:
