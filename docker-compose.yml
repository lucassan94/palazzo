version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saborexpress-backend
    restart: unless-stopped
    ports:
      - "8090:3001"
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST:-86.48.18.22}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-delivery}
      - DB_USER=${DB_USER:-default}
      - DB_PASS=${DB_PASS:-default}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - RESTAURANT_ID=${RESTAURANT_ID:-1}
      - CORS_ORIGIN=https://cliente.saborexpress.com,https://admin.saborexpress.com,https://entregador.saborexpress.com
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - saborexpress-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  cliente:
    build:
      context: ./cliente
      dockerfile: Dockerfile
    container_name: saborexpress-cliente
    restart: unless-stopped
    ports:
      - "8091:80"
    depends_on:
      - backend
    networks:
      - saborexpress-network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: saborexpress-admin
    restart: unless-stopped
    ports:
      - "8092:80"
    depends_on:
      - backend
    networks:
      - saborexpress-network

  entregador:
    build:
      context: ./entregador
      dockerfile: Dockerfile
    container_name: saborexpress-entregador
    restart: unless-stopped
    ports:
      - "8093:80"
    depends_on:
      - backend
    networks:
      - saborexpress-network

volumes:
  backend_uploads:

networks:
  saborexpress-network:
    driver: bridge
